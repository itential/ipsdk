# .github/workflows/release-test.yml
# This workflow tests the GoReleaser configuration without creating an actual release
# It runs on pull requests that modify release-related files
---
name: Test GoReleaser configuration

on:
  pull_request:
    paths:
      - '.goreleaser.yml'
      - '.github/workflows/release.yaml'
      - '.github/workflows/prerelease.yaml'
      - 'pyproject.toml'
      - 'Makefile'

jobs:
  test-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Fetch full history for GoReleaser changelog generation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Set up Go (required for GoReleaser)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check

      - name: Test GoReleaser build (dry run)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}