# ---
# Workflow: Release
#
# Triggers on version tags (v*.*.*). Builds the distribution packages and
# publishes to PyPI via trusted publisher (OIDC — no static credentials),
# then creates a GitHub Release with the built artifacts attached.
#
# Jobs: build-and-publish
# Secrets required: none (uses OIDC trusted publisher configured on PyPI)
# ---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create a GitHub Release
  id-token: write   # Required for PyPI trusted publisher (OIDC)

jobs:

  # -- build-and-publish
  # Builds wheel + sdist, publishes to PyPI via OIDC, then creates a
  # GitHub Release with the dist artifacts attached.
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch full history so uv-dynamic-versioning can read git tags
          fetch-depth: 0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
          draft: false
          prerelease: false
